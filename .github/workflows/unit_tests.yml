name: Unit Tests

defaults:
  run:
    shell: bash -le {0}

on:
  push:
  repository_dispatch:
  workflow_dispatch:

env:
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  RUNNER: 10.0.13.31
  UV_TORCH_BACKEND: cu130
  PYTHON_VERSION: 3.14t
  UV_PYTHON: 3.14t

concurrency:
  group: ${{ github.ref }}-workflow-unit-tests
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ] # macos-latest arm64, macos-13 intel
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
          cache: 'pip'

      - name: install
        run: pip install . pytest

      - name: test os
        run: pytest tests/test_os.py

      - name: test cpu
        if: always()
        run: pytest tests/test_cpu.py

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: clean dir
        run: rm -rf .git

      - name: Test in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          copyback: false
          prepare: |
            env ASSUME_ALWAYS_YES=yes pkg install -y python py311-pip
          run: |
            python -V
            python -m venv venv
            . venv/bin/activate
            pip install . pytest
            pytest tests/test_os.py

  solaris:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: clean dir
        run: rm -rf .git

      - name: Test in Solaris
        uses: vmactions/solaris-vm@v1
        with:
          copyback: false
          run: |
            python -V
            python -m venv venv
            source venv/bin/activate
            pip install . pytest
            pytest tests/test_os.py

  wsl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          additional-packages:
            python3-pip
            python3-venv

      - name: test os
        shell: wsl-bash -u root {0}
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install . pytest
          pytest tests/test_os.py

  gpu:
    runs-on: [self-hosted, Linux]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:130-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        - /monster/ci/uv:/opt/uv
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    steps:
      - uses: actions/checkout@v6

      - name: Activate uv env
        run: |
          env_name="${{ env.UV_TORCH_BACKEND }}_torch_latest_py${{ env.PYTHON_VERSION }}_build"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Install pciutils
        run: apt update && apt install -y pciutils

      - name: install
        run: uv pip install . pytest

      - name: test os
        run: pytest tests/test_os.py

      - name: Find suitable GPU
        run: |
          gpu_id=$(curl -s "http://10.0.14.249/gpu/get?id=${{ github.run_id }}&timestamp=$(date +%s%3N)&runner=${RUNNER_NAME}&force=1")
          echo "CUDA_VISIBLE_DEVICES=$gpu_id" >> $GITHUB_ENV
          echo "CUDA_VISIBLE_DEVICES=$gpu_id"

      - name: test cpu
        run: pytest tests/test_cpu.py

      - name: test gpu
        if: always() && !cancelled()
        run: pytest tests/test_gpu.py

